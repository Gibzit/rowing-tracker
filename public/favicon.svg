<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0f1b33"/>
      <stop offset="100%" stop-color="#0b1326"/>
    </linearGradient>
    <linearGradient id="electricBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5e7ff"/>
      <stop offset="50%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#007ea0"/>
    </linearGradient>
    <linearGradient id="waterGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#a5e7ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Water waves -->
  <path d="M0 350 Q64 330 128 350 T256 350 T384 350 T512 350 L512 512 Q448 512 384 512 L128 512 Q40 512 0 470 Z" fill="url(#waterGlow)"/>
  <path d="M0 380 Q64 360 128 380 T256 380 T384 380 T512 380 L512 512 Q448 512 384 512 L128 512 Q40 512 0 470 Z" fill="#00d2ff" opacity="0.05"/>
  <!-- Rowing shell -->
  <path d="M90 300 Q110 272 256 268 Q402 272 422 300 Q408 312 256 306 Q104 312 90 300Z" fill="url(#electricBlue)"/>
  <!-- Rower -->
  <circle cx="256" cy="248" r="20" fill="#00d2ff"/>
  <path d="M244 268 Q248 290 256 294 Q264 290 268 268" fill="#00d2ff" opacity="0.9"/>
  <!-- Left oar -->
  <line x1="232" y1="264" x2="115" y2="210" stroke="#00d2ff" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="108" cy="206" rx="18" ry="7" transform="rotate(-25 108 206)" fill="#a5e7ff" opacity="0.85"/>
  <!-- Right oar -->
  <line x1="280" y1="264" x2="397" y2="210" stroke="#00d2ff" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="404" cy="206" rx="18" ry="7" transform="rotate(25 404 206)" fill="#a5e7ff" opacity="0.85"/>
  <!-- Kinetic accent line -->
  <rect x="176" y="148" width="160" height="3" rx="1.5" fill="#00d2ff" opacity="0.3"/>
</svg>
